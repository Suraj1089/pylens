name: Publish to Open VSX

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Resolve extension coordinates
        id: meta
        run: |
          node -e "const fs=require('fs'); const p=require('./package.json'); fs.appendFileSync(process.env.GITHUB_OUTPUT, 'publisher='+p.publisher+'\\nname='+p.name+'\\nversion='+p.version+'\\n');"

      - name: Show target extension URL
        run: |
          EXTENSION_ID="${{ steps.meta.outputs.publisher }}.${{ steps.meta.outputs.name }}"
          echo "Open VSX URL: https://open-vsx.org/extension/${{ steps.meta.outputs.publisher }}/${{ steps.meta.outputs.name }}"
          echo "Extension ID: $EXTENSION_ID"
          echo "Version: ${{ steps.meta.outputs.version }}"

      - name: Publish to Open VSX
        env:
          OPEN_VSX_TOKEN: ${{ secrets.OPEN_VSX_TOKEN }}
        run: |
          if [ -z "$OPEN_VSX_TOKEN" ]; then
            echo "OPEN_VSX_TOKEN is not set. Add it in repository settings -> Secrets and variables -> Actions."
            exit 1
          fi
          npx ovsx publish --skip-duplicate -p "$OPEN_VSX_TOKEN"
